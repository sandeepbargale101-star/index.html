<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voter AI App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    padding: 10px;
}
.container {
    max-width: 500px;
    margin: auto;
    background: white;
    padding: 15px;
    border-radius: 10px;
}
h2 {
    text-align: center;
}
input, button {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
}
button {
    background: #007bff;
    color: white;
    border: none;
}
.card {
    background: #eee;
    padding: 10px;
    margin-top: 5px;
}
.hidden {
    display: none;
}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Voter AI System</h2>

<!-- LOGIN -->
<div id="loginSection">
<h3>Login</h3>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>

<h4>OR Register</h4>
<button onclick="register()">Create Account</button>

<p id="loginStatus"></p>
</div>

<!-- APP -->
<div id="appSection" class="hidden">

<button onclick="logout()">Logout</button>

<h3>Upload PDF</h3>

<input type="file" id="fileInput">

<input type="number" id="startPage" placeholder="Start Page" value="1">
<input type="number" id="endPage" placeholder="End Page" value="5">

<button onclick="uploadFile()">Upload & Process</button>

<p id="status"></p>

<hr>

<h3>📊 Dashboard</h3>

<div id="stats"></div>

<canvas id="chart"></canvas>

<br>
<a id="downloadLink" target="_blank">Download Excel</a>

</div>

</div>

<script>

// 🔴 CHANGE THIS AFTER DEPLOYMENT
const BASE_URL = "https://your-app.onrender.com";

let token = "";

// 🔐 LOGIN
async function login() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    document.getElementById("loginStatus").innerText = "Logging in...";

    try {
        let res = await fetch(BASE_URL + "/login", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: `username=${username}&password=${password}`
        });

        let data = await res.json();
        console.log(data);

        if (data.access_token) {
            token = data.access_token;

            localStorage.setItem("token", token);

            showApp();
        } else {
            document.getElementById("loginStatus").innerText = "❌ Login Failed";
        }

    } catch (err) {
        document.getElementById("loginStatus").innerText = "⚠️ Server not reachable";
    }
}

// 🆕 REGISTER
async function register() {
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    try {
        let res = await fetch(BASE_URL + "/register", {
            method: "POST",
            headers: {"Content-Type": "application/x-www-form-urlencoded"},
            body: `username=${username}&password=${password}`
        });

        alert("✅ User created! Now login.");
    } catch {
        alert("❌ Register failed");
    }
}

// 📤 UPLOAD
async function uploadFile() {

    let file = document.getElementById("fileInput").files[0];
    if (!file) {
        alert("Select file");
        return;
    }

    let formData = new FormData();
    formData.append("file", file);
    formData.append("start_page", document.getElementById("startPage").value);
    formData.append("end_page", document.getElementById("endPage").value);

    document.getElementById("status").innerText = "Processing...";

    try {
        let res = await fetch(BASE_URL + "/upload/", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + token
            },
            body: formData
        });

        let data = await res.json();
        console.log(data);

        showResults(data);

    } catch {
        document.getElementById("status").innerText = "❌ Upload failed";
    }
}

// 📊 SHOW RESULTS
function showResults(data) {

    document.getElementById("status").innerText = "✅ Done";

    document.getElementById("stats").innerHTML = `
        <div class="card">Total: ${data.total || 0}</div>
        <div class="card">Male: ${data.male || 0}</div>
        <div class="card">Female: ${data.female || 0}</div>
        <div class="card">Other: ${data.other || 0}</div>
    `;

    if (data.file) {
        document.getElementById("downloadLink").href = data.file;
        document.getElementById("downloadLink").innerText = "Download Excel";
    }

    let ctx = document.getElementById("chart");

    new Chart(ctx, {
        type: 'pie',
        data: {
            labels: ["Male", "Female", "Other"],
            datasets: [{
                data: [
                    data.male || 0,
                    data.female || 0,
                    data.other || 0
                ]
            }]
        }
    });
}

// 🔓 LOGOUT
function logout() {
    localStorage.removeItem("token");
    location.reload();
}

// 🔁 AUTO LOGIN
function showApp() {
    document.getElementById("loginSection").classList.add("hidden");
    document.getElementById("appSection").classList.remove("hidden");
}

// On load
window.onload = () => {
    let saved = localStorage.getItem("token");
    if (saved) {
        token = saved;
        showApp();
    }
}

</script>

</body>
</html>
