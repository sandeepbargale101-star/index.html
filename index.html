<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Voter AI App (Offline)</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; padding:10px;}
.container { background:white; padding:15px; border-radius:10px;}
input,button { width:100%; padding:10px; margin-top:8px;}
button { background:#007bff; color:white; border:none;}
.hidden { display:none; }
.card { background:#eee; padding:10px; margin-top:5px;}
</style>
</head>

<body>

<div class="container">

<h2>🗳️ Voter AI System (Offline)</h2>

<!-- LOGIN -->
<div id="loginSection">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="register()">Register</button>

<p id="msg"></p>
</div>

<!-- APP -->
<div id="appSection" class="hidden">

<button onclick="logout()">Logout</button>

<h3>Upload PDF</h3>
<input type="file" id="fileInput">

<button onclick="process()">Process File</button>

<p id="status"></p>

<h3>📊 Dashboard</h3>
<div id="stats"></div>
<canvas id="chart"></canvas>

</div>

</div>

<script>

// 🔐 REGISTER (saved in browser)
function register(){
    let u = username.value;
    let p = password.value;

    if(!u || !p){
        msg.innerText = "Enter username & password";
        return;
    }

    localStorage.setItem("user_"+u, p);
    msg.innerText = "✅ Registered! Now login.";
}

// 🔐 LOGIN
function login(){
    let u = username.value;
    let p = password.value;

    let saved = localStorage.getItem("user_"+u);

    if(saved === p){
        localStorage.setItem("logged", u);
        showApp();
    } else {
        msg.innerText = "❌ Invalid login";
    }
}

// 🔓 LOGOUT
function logout(){
    localStorage.removeItem("logged");
    location.reload();
}

// SHOW APP
function showApp(){
    loginSection.classList.add("hidden");
    appSection.classList.remove("hidden");
}

// PROCESS (SIMULATED DATA)
function process(){

    if(!fileInput.files.length){
        alert("Select file");
        return;
    }

    status.innerText = "Processing...";

    // 🔥 Simulated data (replace later with real OCR)
    let data = {
        total: 120,
        male: 70,
        female: 45,
        other: 5
    };

    showResults(data);
}

// SHOW RESULTS
function showResults(d){

    status.innerText = "✅ Done";

    stats.innerHTML = `
        <div class="card">Total: ${d.total}</div>
        <div class="card">Male: ${d.male}</div>
        <div class="card">Female: ${d.female}</div>
        <div class="card">Other: ${d.other}</div>
    `;

    new Chart(chart, {
        type: 'pie',
        data: {
            labels:["Male","Female","Other"],
            datasets:[{data:[d.male,d.female,d.other]}]
        }
    });
}

// AUTO LOGIN
if(localStorage.getItem("logged")){
    showApp();
}

</script>

</body>
</html>
